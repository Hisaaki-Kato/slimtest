            orders__currency: JPY
            orders__channel: mobile
            orders__placed_at: '2024-02-10 10:00:00'
            customers__customer_id: 8002
            customers__country: JP
            customers__tier: premium
            customers__signup_source: paid_ads
            products__product_id: 3002
            products__category: books
            products__price: 4500
          - order_events__event_id: 10103
            order_events__order_id: 5002
            order_events__event_type: cancelled
            order_events__occurred_at: '2024-02-10 12:00:00'
            order_events__cancelled_at: null
            orders__order_id: 5002
            orders__customer_id: 8002
            orders__total_amount: 4500
            orders__currency: JPY
            orders__channel: mobile
            orders__placed_at: '2024-02-10 10:00:00'
            customers__customer_id: 8002
            customers__country: JP
            customers__tier: premium
            customers__signup_source: paid_ads
            products__product_id: 3002
            products__category: books
            products__price: 4500
    expect:
      rows:
        - order_id: 5002
          customer_id: 8002
          country: JP
          product_category: books
          total_amount: 4500
          currency: JPY
          status: pending
          valid_from: '2024-02-10 10:00:00'
          valid_to: '2024-02-10 10:15:00'
        - order_id: 5002
          customer_id: 8002
          country: JP
          product_category: books
          total_amount: 4500
          currency: JPY
          status: processing
          valid_from: '2024-02-10 10:15:00'
          valid_to: '2024-02-10 12:00:00'
        - order_id: 5002
          customer_id: 8002
          country: JP
          product_category: books
          total_amount: 4500
          currency: JPY
          status: cancelled
          valid_from: '2024-02-10 12:00:00'
          valid_to: null

