version: 2

models:
  - name: order_events_enriched
    description: |
      Wide table joining order_events with orders, customers and products.
      Downstream models build status intervals and aggregates from this.
    columns:
      - name: order_events__event_id
        description: Unique key for the event.
        data_tests:
          - not_null
          - unique
      - name: order_events__order_id
        description: Order the event belongs to.
      - name: order_events__event_type
        description: placed / paid / shipped / delivered / cancelled / returned.
      - name: order_events__occurred_at
        description: When the event happened.
      - name: order_events__cancelled_at
        description: When this event itself was cancelled (null if still valid).
      - name: orders__order_id
      - name: orders__customer_id
      - name: orders__total_amount
      - name: orders__currency
      - name: orders__channel
      - name: orders__placed_at
      - name: customers__customer_id
      - name: customers__country
      - name: customers__tier
      - name: customers__signup_source
      - name: products__product_id
      - name: products__category
      - name: products__price
