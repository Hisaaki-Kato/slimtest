name: 'slimtest_sample'
version: '1.0.0'
config-version: 2

profile: 'slimtest_sample'

model-paths: ["models", "target/slimtest"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  slimtest_sample:
    intermediate:
      +materialized: view
    marts:
      +materialized: table

seeds:
  slimtest_sample:
    +quote_columns: false
