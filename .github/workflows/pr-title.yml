name: PR Title

# With squash-merge, a PR's title becomes the commit subject on `main`, and
# release-please parses those subjects to decide version bumps and CHANGELOG
# entries. So the PR title MUST be a valid Conventional Commit
# (e.g. `feat: ...`, `fix: ...`, `feat!: ...`). This check enforces that.

on:
  pull_request_target:
    types:
      - opened
      - edited
      - reopened
      - synchronize

permissions:
  pull-requests: read

jobs:
  lint:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@0723387faaf9b38adef4775cd42cfd5155ed6017 # v5.5.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
