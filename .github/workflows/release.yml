name: Release

# Publish to PyPI when a `v*` tag is pushed.
#
# Uses PyPI Trusted Publishers (OIDC): no API token required in secrets.
# Setup: once the workflow file lands on `main`, register the publisher
# at https://pypi.org/manage/account/publishing/ with
#   repo:     Hisaaki-Kato/slimtest
#   workflow: release.yml
#   env:      (leave blank)

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/slimtest
    permissions:
      # Required for PyPI Trusted Publishers OIDC exchange.
      id-token: write
      # Required for softprops/action-gh-release to create the GH Release.
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync

      - name: Verify tag matches pyproject.toml version
        # Guard against publishing when the pushed `v*` tag disagrees
        # with the version hard-coded in pyproject.toml -- otherwise a
        # `v0.2.0` tag would happily publish `0.1.0` (or vice versa),
        # leaving GitHub tag / Release and PyPI pointing at different
        # artefacts.
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PYPROJECT_VERSION=$(uv run python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::tag '${GITHUB_REF_NAME}' says $TAG_VERSION but pyproject.toml says $PYPROJECT_VERSION"
            exit 1
          fi
          echo "✓ tag and pyproject.toml agree on version $PYPROJECT_VERSION"

      - name: Run full quality gate
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy src tests
          uv run pytest -q

      - name: Build sdist and wheel
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          generate_release_notes: true
          files: dist/*
