name: Release

# Automated releases via release-please.
#
# On every push to `main`, the `release-please` job maintains a standing
# "release PR" that aggregates all merged Conventional-Commit PRs since the
# last release, bumps the version in pyproject.toml, and regenerates
# CHANGELOG.md. When a maintainer merges that release PR, release-please
# creates the `v<version>` tag + GitHub Release, and the `publish` job (same
# workflow run, gated on `release_created`) builds and uploads to PyPI.
#
# Why publish lives in THIS workflow rather than a separate tag-triggered
# one: a tag pushed by release-please uses GITHUB_TOKEN, and GitHub does not
# let GITHUB_TOKEN-created events trigger other workflows -- a tag-triggered
# publish would silently never run. Keeping publish in the same run sidesteps
# that entirely (the trigger is the human merging the release PR).
#
# The file is intentionally still named `release.yml` so the existing PyPI
# Trusted Publisher registration (workflow: release.yml) keeps working with
# no dashboard change.

on:
  push:
    branches:
      - main

# Least privilege at the workflow level; each job widens its own scope.
permissions:
  contents: read

jobs:
  release-please:
    name: Maintain release PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Build and publish to PyPI
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/slimtest
    permissions:
      # Required for PyPI Trusted Publishers OIDC exchange.
      id-token: write
      # Required to upload build artefacts to the GitHub Release.
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          # Check out the tag release-please just created, not the branch tip.
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Install uv
        uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3.2.4

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync

      - name: Run full quality gate
        run: |
          uv run ruff check .
          uv run ruff format --check .
          uv run mypy src tests
          uv run pytest -q

      - name: Build sdist and wheel
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0

      - name: Attach build artefacts to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ needs.release-please.outputs.tag_name }}" dist/* --clobber
